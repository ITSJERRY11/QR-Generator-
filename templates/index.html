<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-3xl shadow-2xl p-6 md:p-8 space-y-6">
        
        <div class="text-center space-y-2">
            <div class="inline-flex p-3 bg-indigo-500/10 rounded-2xl text-indigo-400 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h4.5c-.621 0-1.125-.504-1.125-1.125v-4.5zM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h4.5c-.621 0-1.125-.504-1.125-1.125v-4.5zM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h4.5c-.621 0-1.125-.504-1.125-1.125v-4.5zM13.5 14.25a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75zm0 3.75a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75 75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75zm3.75-3.75a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75zm0 3.75a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">QR Code Generator</h1>
            <p class="text-sm text-slate-400">Convert any URL into a clean, downloadable QR code instantly.</p>
        </div>

        <form action="/" method="POST" class="space-y-4">
            <div class="space-y-2">
                <label for="url" class="text-xs font-semibold text-slate-300 uppercase tracking-wider">Paste Link Here</label>
                <input 
                    type="url" 
                    name="url" 
                    id="url" 
                    placeholder="https://example.com" 
                    required
                    value="{{ url if url else '' }}"
                    class="w-full px-4 py-3.5 bg-slate-800/50 border border-slate-700/60 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200"
                >
            </div>
            <button 
                type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-[0.99] text-white font-medium py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-600/20 transition-all duration-150 cursor-pointer text-center"
            >
                Generate QR Code
            </button>
        </form>

        {% if qr_base64 %}
        <div class="pt-4 border-t border-slate-800/80 flex flex-col items-center space-y-5 animate-fade-in">
            
            <div class="bg-white p-4 rounded-2xl shadow-xl shadow-black/40 border border-slate-100">
                <img src="data:image/png;base64,{{ qr_base64 }}" alt="Generated QR Code" class="w-48 h-48">
            </div>

            <a 
                href="data:image/png;base64,{{ qr_base64 }}" 
                download="qrcode.png" 
                class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 active:scale-[0.99] text-white font-medium py-3 px-6 rounded-xl shadow-lg shadow-emerald-600/10 transition-all duration-150 cursor-pointer"
            >
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                </svg>
                Download PNG
            </a>
        </div>
        {% endif %}

    </div>

</body>
</html>
