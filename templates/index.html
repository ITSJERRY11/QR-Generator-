<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated QR Code Generator</title>
    <style>
        /* 1. Animated Gradient Background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Glassmorphism Card Style */
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-out; /* Fade in on load */
        }

        h1 {
            margin-top: 0;
            color: #222;
        }

        /* 3. Form Styling */
        input[type="url"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: #23a6d5;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #23a6d5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #1b8eb8;
            transform: translateY(-2px); /* Slight lift on hover */
        }

        button:active {
            transform: translateY(0);
        }

        /* 4. QR Code Pop-in Animation */
        .qr-result {
            margin-top: 30px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; /* Bouncy pop-in */
        }

        .qr-result img {
            border: 8px solid white;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            max-width: 100%;
            height: auto;
            transition: transform 0.3s ease;
        }

        .qr-result img:hover {
            transform: scale(1.05); /* Slight zoom when hovering over the QR code */
        }

        /* Keyframes for animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>QR Generator</h1>
        <p>Paste a link to create your custom QR code.</p>

        <form method="POST">
            <input type="url" name="link" placeholder="https://example.com" required>
            <button type="submit">Generate Code</button>
        </form>

        {% if qr_image %}
            <div class="qr-result">
                <h3>Your QR Code:</h3>
                <img src="data:image/png;base64,{{ qr_image }}" alt="Generated QR Code">
            </div>
        {% endif %}
    </div>

</body>
</html>
